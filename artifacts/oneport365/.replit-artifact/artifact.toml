kind = "web"
previewPath = "/"
title = "OnePort 365"
version = "1.0.0"
id = "artifacts/oneport365"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26171

[services.development]
run = "pnpm --filter @workspace/oneport365 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oneport365", "run", "build" ]
publicDir = "artifacts/oneport365/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26171"
BASE_PATH = "/"
